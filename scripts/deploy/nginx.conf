# /etc/nginx/sites-available/ads-mangment
# After editing:
#   sudo ln -sf /etc/nginx/sites-available/ads-mangment /etc/nginx/sites-enabled/ads-mangment
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# To add HTTPS once you have a domain pointing at this EC2:
#   sudo certbot --nginx -d ads.yourcompany.com

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Frontend static build
    root /var/www/ads-mangment;
    index index.html;

    client_max_body_size 25m;

    # Security headers (helmet covers the API; these harden the static site)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API → backend
    location /api/ {
        proxy_pass http://127.0.0.1:3800/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Media → backend (which 302s to S3 when MEDIA_STORAGE=s3)
    location /media/ {
        proxy_pass http://127.0.0.1:3800/media/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
